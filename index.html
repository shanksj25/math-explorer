<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sector 06: Explorer | Command Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at center, #0a0e17 0%, #02040a 100%);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            opacity: 0.3;
        }

        .header-font { font-family: 'Orbitron', sans-serif; }

        .mission-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(56, 189, 248, 0.2);
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mission-card:hover {
            border-color: rgba(56, 189, 248, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .planet-glow-purple { filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.4)); }
        .planet-glow-teal { filter: drop-shadow(0 0 15px rgba(20, 184, 166, 0.4)); }

        .btn-action {
            background: linear-gradient(90deg, #0ea5e9, #6366f1);
            transition: all 0.2s;
        }

        .btn-action:hover {
            filter: brightness(1.2);
            letter-spacing: 1px;
        }

        .status-badge {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #60a5fa;
            text-shadow: 0 0 8px rgba(96, 165, 250, 0.5);
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="star-field"></div>

    <!-- UI Overlay -->
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-start mb-16">
            <div>
                <p class="status-badge mb-1 uppercase">Deep Space Education Command</p>
                <h1 class="header-font text-4xl md:text-5xl font-bold tracking-tighter border-l-4 border-sky-500 pl-4">
                    SECTOR 06: EXPLORER
                </h1>
            </div>
            <div class="text-right">
                <span class="inline-flex items-center px-3 py-1 rounded-full bg-slate-800 border border-slate-700 text-xs font-mono text-sky-400 animate-pulse">
                    <span class="w-2 h-2 rounded-full bg-sky-400 mr-2"></span>
                    OFFLINE_MODE
                </span>
            </div>
        </div>

        <!-- Mission Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <!-- Planet Negaton (ID: 1) -->
            <div class="mission-card rounded-2xl p-8 flex flex-col items-center text-center relative overflow-hidden">
                <div id="check-1" class="hidden absolute top-4 right-4 bg-green-500 text-white p-1 rounded-md shadow-lg z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>
                
                <div class="w-32 h-32 mb-6 rounded-full bg-gradient-to-br from-indigo-600 to-purple-900 planet-glow-purple flex items-center justify-center">
                    <div class="w-full h-full rounded-full opacity-30 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                </div>
                
                <h2 class="header-font text-2xl mb-1">Planet Negaton</h2>
                <p class="text-sky-400 text-sm font-bold tracking-widest mb-8 uppercase">Integers</p>
                
                <button onclick="location.href='planet_negaton.html'" id="btn-1" class="btn-action w-full py-3 rounded-lg header-font text-sm font-bold uppercase tracking-widest">
                    Initiate Landing
                </button>
            </div>

            <!-- Rational Remnants (ID: 2) -->
            <div class="mission-card rounded-2xl p-8 flex flex-col items-center text-center relative overflow-hidden">
                <div id="check-2" class="hidden absolute top-4 right-4 bg-green-500 text-white p-1 rounded-md shadow-lg z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                    </svg>
                </div>

                <div class="w-32 h-32 mb-6 rounded-full bg-gradient-to-br from-teal-500 to-emerald-900 planet-glow-teal flex items-center justify-center">
                    <div class="w-full h-full rounded-full opacity-30 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
                </div>
                
                <h2 class="header-font text-2xl mb-1">Rational Remnants</h2>
                <p class="text-sky-400 text-sm font-bold tracking-widest mb-8 uppercase">Positive Rationals</p>
                
                <button onclick="location.href='rational_remnants.html'" id="btn-2" class="btn-action w-full py-3 rounded-lg header-font text-sm font-bold uppercase tracking-widest">
                    Initiate Landing
                </button>
            </div>

            <!-- Placeholder for future missions -->
            <div class="mission-card rounded-2xl p-8 flex flex-col items-center justify-center text-center border-dashed border-slate-700 opacity-50">
                <div class="w-20 h-20 border-2 border-slate-700 rounded-full flex items-center justify-center mb-4">
                    <span class="text-3xl text-slate-700">?</span>
                </div>
                <p class="header-font text-slate-500 uppercase tracking-widest text-sm">Locked Sector</p>
            </div>

        </div>
        
        <!-- Emergency Wipe Button -->
        <div class="mt-12 text-center relative z-50">
            <button onclick="localStorage.clear(); location.reload();" class="text-[10px] text-slate-600 hover:text-red-400 uppercase tracking-widest transition-colors font-bold">
                [ EMERGENCY WIPE: Reset All Progress ]
            </button>
        </div>
    </div>

    <script>
        // --- PROGRESS TRACKER ---
        // This runs on page load to check what missions you've completed
        function loadProgress() {
            try {
                const completed = JSON.parse(localStorage.getItem('completedMissions') || '[]');
                
                completed.forEach(missionId => {
                    // Show checkmark
                    const check = document.getElementById(`check-${missionId}`);
                    if (check) check.classList.remove('hidden');
                    
                    // Change button text
                    const btn = document.getElementById(`btn-${missionId}`);
                    if (btn) {
                        btn.innerText = "Revisit";
                        btn.classList.replace('btn-action', 'bg-slate-700');
                        btn.style.background = "rgba(51, 65, 85, 0.8)";
                    }
                });
                
                console.log("Mission progress loaded from station logs.");
            } catch (e) {
                console.error("Critical error reading flight logs:", e);
            }
        }

        window.onload = loadProgress;
    </script>
</body>
</html>
