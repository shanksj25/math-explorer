<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission: Planet Negaton</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Grotesk:wght@300;500;700&display=swap');
        :root { --pos-color: #22c55e; --neg-color: #ef4444; --space-black: #020617; --sky-glow: #0ea5e9; }
        body { background-color: var(--space-black); color: white; font-family: 'Space Grotesk', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .audiowide { font-family: 'Audiowide', cursive; }
        .chamber { border: 2px solid rgba(14, 165, 233, 0.3); background: rgba(15, 23, 42, 0.5); position: relative; }
        .ion { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; cursor: grab; position: absolute; transition: transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; touch-action: none; }
        .ion-pos { background: var(--pos-color); border: 2px solid #166534; color: #052c14; }
        .ion-neg { background: var(--neg-color); border: 2px solid #991b1b; color: #450a0a; }
        .neutralizing { pointer-events: none !important; animation: flashOut 0.4s ease-out forwards; z-index: 100 !important; }
        @keyframes flashOut { 0% { transform: scale(1); filter: brightness(2.5); opacity: 1; } 100% { transform: scale(1.5); filter: brightness(4); opacity: 0; } }
        .mission-step { padding: 10px; border-left: 4px solid #1e293b; margin-bottom: 8px; transition: all 0.3s; opacity: 0.2; }
        .mission-step.current { opacity: 1; border-left-color: var(--sky-glow); background: rgba(14, 165, 233, 0.1); }
        .mission-step.done { opacity: 0.5; border-left-color: var(--pos-color); text-decoration: line-through; }
        .stability-bar { height: 8px; background: #1e293b; border-radius: 4px; overflow: hidden; width: 120px; }
        .stability-fill { height: 100%; background: linear-gradient(90deg, #ef4444, #eab308, #22c55e); transition: width 0.5s; }
    </style>
</head>
<body>

    <header class="p-4 flex justify-between items-center bg-slate-900 border-b border-sky-900/50">
        <div>
            <h1 class="audiowide text-sky-400 text-lg">PLANET NEGATON</h1>
            <p id="tier-display" class="text-[10px] text-slate-500 uppercase font-bold">Tier 1: Guided Training</p>
        </div>
        <div class="flex flex-col items-end px-6 py-2 bg-slate-950 rounded-xl border border-slate-800">
            <div class="flex items-center gap-3">
                <span class="text-[9px] text-slate-500 uppercase font-black">Stability</span>
                <div class="stability-bar"><div id="stability-fill" class="stability-fill" style="width: 60%;"></div></div>
                <span id="stability-text" class="audiowide text-sm">3.0</span>
            </div>
        </div>
        <div class="text-right">
            <span id="sync-status" class="text-xs font-bold text-yellow-500 uppercase">Connecting...</span>
        </div>
    </header>

    <main class="flex-grow flex p-4 gap-4 overflow-hidden">
        <aside class="w-80 flex flex-col gap-4">
            <div class="bg-slate-900/50 p-5 rounded-2xl border border-sky-900/20 flex-grow overflow-y-auto">
                <div id="tier-2-mask" class="hidden text-center py-10 opacity-50"><p class="text-xs italic">Command Mode Active.</p></div>
                <div id="guided-steps">
                    <div id="step-1" class="mission-step"><p class="text-[10px] font-black text-sky-500">STEP 01</p><p id="instr-1" class="text-sm">--</p></div>
                    <div id="step-2" class="mission-step"><p class="text-[10px] font-black text-slate-500">STEP 02</p><p id="instr-2" class="text-sm">--</p></div>
                    <div id="step-3" class="mission-step"><p class="text-[10px] font-black text-slate-500">STEP 03</p><p class="text-sm">Neutralize pairs.</p></div>
                </div>
            </div>
            <div class="bg-slate-900/80 p-6 rounded-2xl border border-sky-900/20 flex justify-around">
                <button onclick="spawnIon('pos')" class="w-14 h-14 ion-pos rounded-2xl text-2xl font-bold">+</button>
                <button onclick="spawnIon('neg')" class="w-14 h-14 ion-neg rounded-2xl text-2xl font-bold">−</button>
            </div>
        </aside>

        <div class="flex-grow flex flex-col gap-4">
            <div id="ion-chamber" class="chamber flex-grow rounded-3xl relative overflow-hidden">
                <div class="absolute top-6 right-6 bg-slate-950/90 p-5 rounded-2xl border border-sky-900/50 z-20">
                    <h2 id="current-equation" class="audiowide text-4xl">Initializing...</h2>
                </div>
                <div id="ion-field" class="absolute inset-0"></div>
            </div>
            <div class="bg-slate-900/90 p-5 rounded-2xl border border-sky-900/20 flex items-center justify-between">
                <div id="net-display-box" class="bg-black/60 px-6 py-3 rounded-xl border border-slate-800">
                    <span id="net-value" class="audiowide text-3xl">0</span>
                </div>
                <div class="flex gap-4">
                    <input type="number" id="user-answer" placeholder="?" class="bg-black border border-slate-700 rounded-xl px-4 py-3 w-24 text-center audiowide text-2xl text-white outline-none">
                    <button onclick="verifyResult()" class="bg-sky-600 hover:bg-sky-500 text-white font-bold px-8 rounded-xl uppercase text-xs">Verify</button>
                </div>
            </div>
        </div>
    </main>

    <div id="success-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md hidden z-50 flex items-center justify-center p-6">
        <div class="bg-slate-900 p-10 rounded-[2.5rem] border-2 border-sky-500/50 text-center max-w-sm">
            <h2 id="modal-title" class="audiowide text-2xl text-white mb-2 uppercase">STABILIZED</h2>
            <p id="modal-text" class="text-slate-400 text-sm mb-8">System synchronization complete.</p>
            <button id="modal-btn" onclick="nextProblem()" class="w-full bg-sky-600 py-4 rounded-xl font-bold text-white">PROCEED</button>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const MISSION_ID = "negaton"; // Shared with Hub
        const firebaseConfig = JSON.parse(__firebase_config);
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Get UID from URL (passed by the Hub)
        const urlParams = new URLSearchParams(window.location.search);
        const userUID = urlParams.get('uid');

        if (userUID) {
            document.getElementById('sync-status').innerText = 'LINKED';
            document.getElementById('sync-status').classList.replace('text-yellow-500', 'text-green-500');
        }

        async function markMissionComplete() {
            if (!userUID) return;
            const docRef = db.doc(`artifacts/${__app_id}/users/${userUID}/progress/status`);
            await docRef.set({ [MISSION_ID]: "completed" }, { merge: true });
        }

        // --- GAME LOGIC ---
        let stability = 3.0, currentTier = 1, currentProblem = null, currentStep = 1, attempts = 0;

        function initGame() {
            currentStep = currentTier === 1 ? 1 : 3;
            attempts = 0;
            document.getElementById('ion-field').innerHTML = '';
            document.getElementById('user-answer').value = '';
            currentProblem = generateProblem();
            document.getElementById('current-equation').innerText = currentProblem.display;
            
            if (currentTier === 1) {
                document.getElementById('tier-display').innerText = "Tier 1: Training";
                document.getElementById('instr-1').innerText = `Add ${Math.abs(currentProblem.a)} ${currentProblem.a > 0 ? 'Pos' : 'Neg'} ions.`;
                document.getElementById('instr-2').innerText = `Add ${Math.abs(currentProblem.b)} ${currentProblem.b > 0 ? 'Pos' : 'Neg'} ions.`;
            } else {
                document.getElementById('tier-display').innerText = "Tier 2: Command";
                document.getElementById('guided-steps').classList.add('hidden');
                document.getElementById('tier-2-mask').classList.remove('hidden');
            }
            updateUI();
        }

        function generateProblem() {
            const a = Math.floor(Math.random() * 10) - 5 || 1;
            const b = Math.floor(Math.random() * 10) - 5 || -1;
            return { a, b, target: a + b, display: `${a < 0 ? '('+a+')' : a} + ${b < 0 ? '('+b+')' : b}` };
        }

        function spawnIon(type) {
            const ion = document.createElement('div');
            ion.className = `ion ion-unit ion-${type}`;
            ion.setAttribute('data-ion-type', type);
            ion.innerText = type === 'pos' ? '+1' : '-1';
            const chamber = document.getElementById('ion-chamber');
            const rect = chamber.getBoundingClientRect();
            ion.style.left = (Math.random() * (rect.width - 100) + 50) + 'px';
            ion.style.top = (Math.random() * (rect.height - 100) + 50) + 'px';
            makeDraggable(ion);
            document.getElementById('ion-field').appendChild(ion);
            updateUI();
        }

        function verifyResult() {
            const val = parseInt(document.getElementById('user-answer').value);
            if (val === currentProblem.target) {
                stability = Math.min(5, stability + 1);
                if (stability >= 5) {
                    if (currentTier === 1) {
                        showModal("TIER 1 COMPLETE", "Command Mode Unlocked.", () => { currentTier = 2; stability = 3.0; initGame(); });
                    } else {
                        markMissionComplete().then(() => {
                            showModal("MISSION SECURED", "Sector Stabilized. Return to Hub.", () => {
                                window.location.href = `index.html?uid=${userUID}`; // Go back to Hub
                            });
                        });
                    }
                } else {
                    showModal("STABILIZED", "Telemetry matched.", nextProblem);
                }
            } else {
                stability = Math.max(0, stability - 1);
                updateUI();
                if (stability <= 0) location.reload();
            }
        }

        function updateUI() {
            const pos = document.querySelectorAll('.ion-unit[data-ion-type="pos"]:not(.neutralizing)').length;
            const neg = document.querySelectorAll('.ion-unit[data-ion-type="neg"]:not(.neutralizing)').length;
            document.getElementById('net-value').innerText = pos - neg;
            document.getElementById('stability-text').innerText = stability.toFixed(1);
            document.getElementById('stability-fill').style.width = (stability/5*100) + "%";
            
            if(currentTier === 1) {
                if(currentStep === 1 && (currentProblem.a > 0 ? pos : neg) >= Math.abs(currentProblem.a)) currentStep = 2;
                if(currentStep === 2 && (currentProblem.b > 0 ? pos : neg) >= Math.abs(currentProblem.b)) currentStep = 3;
                [1,2,3].forEach(i => document.getElementById(`step-${i}`).className = currentStep === i ? 'mission-step current' : (currentStep > i ? 'mission-step done' : 'mission-step'));
            }
        }

        function makeDraggable(el) {
            let sx, sy;
            const move = (e) => {
                e.preventDefault();
                const t = e.type === 'touchmove' ? e.touches[0] : e;
                el.style.left = (t.clientX - sx) + "px"; el.style.top = (t.clientY - sy) + "px";
                const others = document.querySelectorAll('.ion-unit:not(.neutralizing)');
                const r1 = el.getBoundingClientRect();
                for (let o of others) {
                    if (o === el || o.getAttribute('data-ion-type') === el.getAttribute('data-ion-type')) continue;
                    const r2 = o.getBoundingClientRect();
                    if (!(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom)) {
                        el.classList.add('neutralizing'); o.classList.add('neutralizing');
                        setTimeout(() => { el.remove(); o.remove(); updateUI(); }, 400);
                        break;
                    }
                }
            };
            const start = (e) => {
                const t = e.type === 'touchstart' ? e.touches[0] : e;
                sx = t.clientX - el.offsetLeft; sy = t.clientY - el.offsetTop;
                document.addEventListener('mousemove', move); document.addEventListener('touchmove', move, {passive:false});
                document.addEventListener('mouseup', () => {document.removeEventListener('mousemove', move); updateUI();});
                document.addEventListener('touchend', () => {document.removeEventListener('touchmove', move); updateUI();});
            };
            el.addEventListener('mousedown', start); el.addEventListener('touchstart', start);
        }

        function showModal(t, txt, cb) {
            document.getElementById('modal-title').innerText = t;
            document.getElementById('modal-text').innerText = txt;
            document.getElementById('modal-btn').onclick = () => { document.getElementById('success-modal').classList.add('hidden'); cb(); };
            document.getElementById('success-modal').classList.remove('hidden');
        }

        function nextProblem() { document.getElementById('success-modal').classList.add('hidden'); initGame(); }
        window.onload = initGame;
    </script>
</body>
</html>
